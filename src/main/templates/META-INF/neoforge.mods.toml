modLoader = "javafml"
loaderVersion = "${loader_version_range}" #mandatory
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
authors = "${mod_authors}"
logoFile= "assets/deepdrilling/icon.png"
description = '''${mod_description}'''

[[mixins]]
config = "${mod_id}.mixins.json"

[[dependencies."${mod_id}"]]
modId = "neoforge"
type = "required"
versionRange = "${neo_version_range}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId = "minecraft"
type = "required"
versionRange = "${minecraft_version}"
ordering = "NONE"
side = "BOTH"

[[dependencies."${mod_id}"]]
modId="create"
type="required"
versionRange="[6.0.9,6.1.0)"
ordering="NONE"
side="BOTH"
